# ============================================================
# Consultio Med - Portainer Stack (Docker Compose v3.8+)
# ============================================================
# Uso no Portainer:
#   1. Stacks > Add stack > name: consultio-med
#   2. Build method: Git Repository ou Webhook
#   3. Repository URL: seu-repositorio
#   4. Stack file path: deploy/portainer-stack.yml
#   5. Environment variables: preencher do portainer.env.example
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: consultio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: consultio
      POSTGRES_USER: consultio
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${SCRIPT_INIT_DB:-./scripts/init-db.sh}:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - consultio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consultio -d consultio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  whatsmeow-bridge:
    build:
      context: /whatsmeow-bridge
      dockerfile: Dockerfile
    container_name: consultio-whatsmeow
    restart: unless-stopped
    environment:
      PORT: 8080
      WHATSMEOW_DATA_DIR: /app/data
      APP_WEBHOOK_URL: http://consultio-med:5173/api/whatsapp/webhook
      WHATSMEOW_WEBHOOK_SECRET: ${WHATSMEOW_WEBHOOK_SECRET}
      WHATSMEOW_API_TOKEN: ${WHATSMEOW_API_TOKEN:-}
    volumes:
      - whatsmeow_data:/app/data
    networks:
      - consultio-net
    depends_on:
      consultio-med:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  consultio-med:
    build:
      context: /
      dockerfile: Dockerfile
    container_name: consultio-med
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5173
      APP_URL: ${APP_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WHATSMEOW_API_URL: http://whatsmeow-bridge:8080
      WHATSMEOW_API_TOKEN: ${WHATSMEOW_API_TOKEN:-}
      WHATSMEOW_WEBHOOK_SECRET: ${WHATSMEOW_WEBHOOK_SECRET}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL:-owner@consultio.local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-true}
    volumes:
      - consultio_med_data:/app/data
      - consultio_uploads:/app/uploads
    networks:
      - consultio-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: consultio-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - consultio-net
    depends_on:
      consultio-med:
        condition: service_healthy

networks:
  consultio-net:
    name: consultio-network
    driver: bridge

volumes:
  postgres_data:
    name: consultio_postgres_data
  consultio_med_data:
    name: consultio_med_data
  consultio_uploads:
    name: consultio_uploads
  whatsmeow_data:
    name: consultio_whatsmeow_data
  caddy_data:
    name: consultio_caddy_data
  caddy_config:
    name: consultio_caddy_config
