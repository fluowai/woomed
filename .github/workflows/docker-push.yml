name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: fluowai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            file: Dockerfile.frontend
            image: consultio-frontend
            context: .
          - name: api
            file: Dockerfile.api
            image: consultio-api
            context: .
          - name: whatsmeow
            file: ./whatsmeow-bridge/Dockerfile
            image: consultio-whatsmeow
            context: ./whatsmeow-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
