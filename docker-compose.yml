version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: consultio
      POSTGRES_USER: consultio
      POSTGRES_PASSWORD: "consultiopassword"
    volumes:
      - data_postgres:/var/lib/postgresql/data
    networks:
      - woomed-internal
    restart: always

  api:
    image: ghcr.io/fluowai/consultio-api:latest
    environment:
      NODE_ENV: production
      PORT: "5173"
      APP_URL: "https://woomed.consultio.com.br"
      ALLOWED_ORIGINS: "https://woomed.consultio.com.br"
      CORS_ORIGIN: "https://woomed.consultio.com.br"
      JWT_SECRET: "bhj47BqUl6kamMPlO1lTR8gEiiKJNgD8m7acHGwJGwXkS1ywp63fq6pLMEWiCQDwmeB44AId/a4mA+HyJn/J6g=="
      ENCRYPTION_MASTER_KEY: "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"
      DATABASE_URL: "postgresql://consultio:consultiopassword@postgres:5432/consultio"
      WHATSMEOW_API_URL: "http://whatsmeow-bridge:8080"
      WHATSMEOW_WEBHOOK_SECRET: "Zq4Tn8KvR2Lp9YxMf7HsDc5BaE1WuGj3NiXr0CeUtQ"
      PLATFORM_OWNER_EMAIL: "noreplay@wootech.com.br"
      PLATFORM_OWNER_PASSWORD: "consultiopassword"
    volumes:
      - data_api:/app/data
      - data_uploads:/app/uploads
    networks:
      - woopanel1
      - woomed-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=woopanel1"
      - "traefik.http.routers.woomed_api.rule=Host(`woomed.consultio.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.woomed_api.entrypoints=websecure"
      - "traefik.http.routers.woomed_api.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.woomed_api.priority=200"
      - "traefik.http.routers.woomed_api.service=woomed_api"
      - "traefik.http.services.woomed_api.loadbalancer.server.port=5173"
    restart: always

  frontend:
    image: ghcr.io/fluowai/consultio-frontend:latest
    environment:
      VITE_API_URL: "same-origin"
    networks:
      - woopanel1
      - woomed-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=woopanel1"
      - "traefik.http.routers.woomed_frontend.rule=Host(`woomed.consultio.com.br`)"
      - "traefik.http.routers.woomed_frontend.entrypoints=websecure"
      - "traefik.http.routers.woomed_frontend.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.woomed_frontend.priority=100"
      - "traefik.http.routers.woomed_frontend.service=woomed_frontend"
      - "traefik.http.services.woomed_frontend.loadbalancer.server.port=80"
    restart: always

  whatsmeow:
    image: ghcr.io/fluowai/consultio-whatsmeow:latest
    environment:
      PORT: "8080"
      WHATSMEOW_DATA_DIR: /app/data
      APP_WEBHOOK_URL: "http://api:5173/api/whatsapp/webhook"
      WHATSMEOW_WEBHOOK_SECRET: "Zq4Tn8KvR2Lp9YxMf7HsDc5BaE1WuGj3NiXr0CeUtQ"
    volumes:
      - data_wpp:/app/data
    networks:
      - woomed-internal
    restart: always

volumes:
  data_postgres:
  data_api:
  data_uploads:
  data_wpp:

networks:
  woopanel1:
    external: true
    name: woopanel1
  woomed-internal:
    driver: bridge
