version: "3.8"

services:
  frontend:
    image: ghcr.io/fluowai/consultio-frontend:latest
    environment:
      VITE_API_URL: "same-origin"
      VITE_SUPABASE_URL: "https://fmhmmayrlsgdmxabosou.supabase.co"
      VITE_SUPABASE_ANON_KEY: "SUA_ANON_KEY"
    networks:
      - woopanel1
      - consultio_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=woopanel1"
        - "traefik.http.routers.woomed_frontend.rule=Host(`woomed.consultio.com.br`)"
        - "traefik.http.routers.woomed_frontend.entrypoints=websecure"
        - "traefik.http.routers.woomed_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.woomed_frontend.priority=100"
        - "traefik.http.routers.woomed_frontend.service=woomed_frontend"
        - "traefik.http.services.woomed_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/consultio-api:latest
    environment:
      NODE_ENV: production
      PORT: 5173
      ALLOWED_ORIGINS: "https://woomed.consultio.com.br"
      CORS_ORIGIN: "https://woomed.consultio.com.br"
      JWT_SECRET: "9a4b8f335b1c97a8e527d4c2b8c5e03a2f72a4e9b7b9f3c88d8b9e6f1a8c7b6d"
      ENCRYPTION_MASTER_KEY: "4e2f1a3b5c7d8e9f0a2b4c6d8e0f1a3b5c7d9e1f2a4b6c8d0e2f4a6b8c0d2e4f"
      SUPABASE_URL: "https://fmhmmayrlsgdmxabosou.supabase.co"
      SUPABASE_ANON_KEY: "SUA_ANON_KEY"
      SUPABASE_SERVICE_ROLE_KEY: ""
      DATABASE_URL: "SUA_DATABASE_URL"
      PGSSLMODE: require
      
      # Integração do WhatsApp
      WHATSMEOW_API_URL: "http://whatsmeow-bridge:8080"
      WHATSMEOW_API_TOKEN: ""
      WHATSMEOW_WEBHOOK_SECRET: "SEU_WEBHOOK_SECRET"
      
      # Integração de E-mails (NOVO)
      SMTP_HOST: "smtp.sendgrid.net"
      SMTP_PORT: "587"
      SMTP_USER: "apikey"
      SMTP_PASS: "SUA_SENHA_DO_SMTP"
      SMTP_FROM: "no-reply@consultio.com.br"
      SMTP_SECURE: "false"

      GEMINI_API_KEY: ""
      PLATFORM_OWNER_EMAIL: "admin@consultio.com.br"
    volumes:
      - consultio_data:/app/data
      - consultio_uploads:/app/uploads
    networks:
      - woopanel1
      - consultio_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=woopanel1"
        - "traefik.http.routers.woomed_api.rule=Host(`woomed.consultio.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.woomed_api.entrypoints=websecure"
        - "traefik.http.routers.woomed_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.woomed_api.priority=200"
        - "traefik.http.routers.woomed_api.service=woomed_api"
        - "traefik.http.services.woomed_api.loadbalancer.server.port=5173"

  whatsmeow-bridge:
    image: ghcr.io/fluowai/consultio-whatsmeow:latest
    environment:
      PORT: 8080
      WHATSMEOW_DATA_DIR: /app/data
      APP_WEBHOOK_URL: http://api:5173/api/whatsapp/webhook
      WHATSMEOW_WEBHOOK_SECRET: "SEU_WEBHOOK_SECRET"
      WHATSMEOW_API_TOKEN: ""
    volumes:
      - whatsmeow_data:/app/data
    networks:
      - consultio_internal
    deploy:
      restart_policy:
        condition: any

volumes:
  consultio_data:
  consultio_uploads:
  whatsmeow_data:

networks:
  woopanel1:
    external: true
    name: woopanel1
  consultio_internal:
    driver: overlay
    attachable: true
